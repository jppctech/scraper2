# Nginx reverse proxy for the Python scraper on KVM8.
#
# Why:
#   - Handles keep-alive pooling so slow clients don't tie up Gunicorn workers
#   - gzip compresses JSON responses (50-500KB HTML payloads)
#   - Buffers requests/responses so Gunicorn only sees complete requests
#   - proxy_buffering OFF for the SSE streaming endpoint
#
# Install:
#   sudo cp scraper-nginx.conf /etc/nginx/sites-available/scraper
#   sudo ln -s /etc/nginx/sites-available/scraper /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream scraper_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;        # Replace with your domain if applicable

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/event-stream;
    gzip_min_length 256;

    # ── Default: buffered proxy ──────────────────────────────────────────
    location / {
        proxy_pass http://scraper_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";      # keep-alive to upstream

        proxy_read_timeout 35s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;

        # Buffer responses (default behavior) — good for /scrape, /scrape/batch
        proxy_buffering on;
    }

    # ── SSE streaming endpoint: NO buffering ─────────────────────────────
    location /scrape/batch/stream {
        proxy_pass http://scraper_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # CRITICAL: disable ALL buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;    # streaming can take longer

        # Also disable gzip for SSE — it introduces buffering
        gzip off;
    }
}
